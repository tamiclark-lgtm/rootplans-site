<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RootPlans | Smart Garden Builder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  margin: 0;
  background: #f4f7f2;
  color: #2d3a2d;
}

header {
  background: #2f5d34;
  color: white;
  padding: 30px 20px;
  text-align: center;
}

.container {
  max-width: 900px;
  margin: 40px auto;
  background: white;
  padding: 40px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

h1 { margin: 0; }
h2 { margin-top: 0; }

input, select, button {
  padding: 10px;
  font-size: 16px;
  margin: 8px 0;
}

input, select {
  width: 100%;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  background: #2f5d34;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #244a28;
}

.success {
  color: green;
  font-weight: 600;
}

.error {
  color: red;
  font-weight: 600;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 30px;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #eee;
  text-align: left;
}

th {
  background: #f0f4ef;
}
</style>
</head>
<body>

<header>
  <h1>🌱 RootPlans</h1>
  <p>Build a garden tailored to your USDA Hardiness Zone</p>
</header>

<div class="container">

<h2>Step 1: Enter Your ZIP Code</h2>

<input type="text" id="zip" placeholder="Enter 5-digit US ZIP">
<button onclick="detectZone()">Detect My Zone</button>

<p id="zoneMessage"></p>

<div id="preferences" style="display:none;">

<h2>Step 2: Customize Your Garden</h2>

<label>Garden Size</label>
<select id="size">
  <option value="small">Small (1–50 sq ft)</option>
  <option value="medium">Medium (50–200 sq ft)</option>
  <option value="large">Large (200+ sq ft)</option>
</select>

<label>
  <input type="checkbox" id="pollinator">
  Prioritize Pollinator-Friendly Plants
</label>

<button onclick="generatePlan()">Generate My Garden Plan</button>

</div>

<table id="plantsTable" style="display:none;">
  <thead>
    <tr>
      <th>Plant</th>
      <th>Category</th>
      <th>Zone</th>
      <th>Pollinator</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<button id="downloadBtn" style="display:none;" onclick="downloadCSV()">Download My Plan</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>

let userZone = null;
let plantsData = [];
let filteredPlants = [];

/* STEP 1: Detect ZIP → Lat/Long → USDA Zone */
async function detectZone() {
  const zip = document.getElementById("zip").value.trim();
  const message = document.getElementById("zoneMessage");

  if (!/^\d{5}$/.test(zip)) {
    message.innerHTML = "<span class='error'>Enter a valid 5-digit ZIP.</span>";
    return;
  }

  try {
    // Get latitude & longitude from ZIP
    const zipRes = await fetch(`https://api.zippopotam.us/us/${zip}`);
    if (!zipRes.ok) throw new Error("ZIP not found.");

    const zipData = await zipRes.json();
    const lat = zipData.places[0].latitude;
    const lon = zipData.places[0].longitude;

    // Get USDA zone using open USDA map API
    const zoneRes = await fetch(
      `https://phzmapi.azurewebsites.net/api/PlantHardinessZone?lat=${lat}&long=${lon}`
    );

    if (!zoneRes.ok) throw new Error("Zone lookup failed.");

    const zoneData = await zoneRes.json();
    userZone = zoneData.zone;

    message.innerHTML = `<span class='success'>Your USDA Zone is ${userZone}</span>`;

    document.getElementById("preferences").style.display = "block";

    loadCSV();

  } catch (err) {
    message.innerHTML = `<span class='error'>Unable to detect zone.</span>`;
  }
}

/* STEP 2: Load Plant Database */
function loadCSV() {
  Papa.parse("rootplans_master_database.csv", {
    download: true,
    header: true,
    complete: function(results) {
      plantsData = results.data;
    }
  });
}

/* STEP 3: Smarter Filtering Logic */
function generatePlan() {

  const pollinatorOnly = document.getElementById("pollinator").checked;
  const size = document.getElementById("size").value;

  filteredPlants = plantsData.filter(p => {

    if (!p["USDA Zone"]) return false;

    const zones = p["USDA Zone"].split(",").map(z => z.trim());

    if (!zones.includes(userZone)) return false;

    if (pollinatorOnly && p["Pollinator Friendly"] !== "Yes")
      return false;

    return true;
  });

  // Basic size logic (limit results)
  if (size === "small") filteredPlants = filteredPlants.slice(0, 6);
  if (size === "medium") filteredPlants = filteredPlants.slice(0, 12);
  if (size === "large") filteredPlants = filteredPlants.slice(0, 20);

  displayPlants();
}

/* STEP 4: Display Table */
function displayPlants() {
  const table = document.getElementById("plantsTable");
  const tbody = table.querySelector("tbody");
  tbody.innerHTML = "";

  filteredPlants.forEach(p => {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${p["Plant Name"] || ""}</td>
      <td>${p["Category"] || ""}</td>
      <td>${p["USDA Zone"] || ""}</td>
      <td>${p["Pollinator Friendly"] || ""}</td>
    `;
    tbody.appendChild(row);
  });

  table.style.display = "table";
  document.getElementById("downloadBtn").style.display = "inline-block";
}

/* STEP 5: Download CSV */
function downloadCSV() {
  const csv = Papa.unparse(filteredPlants);
  const blob = new Blob([csv], { type: "text/csv" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "rootplans_garden_plan.csv";
  link.click();
}

</script>

</body>
</html>
