<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RootPlans Garden Builder</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; }
  label { display: block; margin: 10px 0 5px; }
  input, select, button { padding: 6px; font-size: 16px; margin-bottom: 10px; }
  table { border-collapse: collapse; width: 100%; margin-top: 20px; }
  th, td { border: 1px solid #ddd; padding: 8px; }
  th { background-color: #f2f2f2; }
</style>
</head>
<body>

<h1>🌱 RootPlans Garden Builder</h1>

<label>Enter your US ZIP Code:</label>
<input type="text" id="zip" placeholder="e.g. 17543">
<button onclick="detectZone()">Detect Zone</button>

<p id="zoneMessage"></p>

<div id="preferences" style="display:none;">
  <label>Garden Size:</label>
  <select id="size">
    <option value="small">Small</option>
    <option value="medium">Medium</option>
    <option value="large">Large</option>
  </select>

  <label>
    <input type="checkbox" id="pollinator">
    Pollinator Friendly Only
  </label>

  <button onclick="generatePlan()">Generate Garden Plan</button>
</div>

<table id="plantsTable" style="display:none;">
  <thead>
    <tr>
      <th>Plant</th>
      <th>Category</th>
      <th>Zones</th>
      <th>Pollinator</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<button id="downloadBtn" style="display:none;" onclick="downloadCSV()">Download Plan</button>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
let userZone = null;
let plantsData = [];
let filteredPlants = [];

// STEP 1: Detect zone using free ZIP API
async function detectZone() {
  const zip = document.getElementById("zip").value.trim();
  const message = document.getElementById("zoneMessage");

  if (!zip || zip.length !== 5) {
    message.innerText = "Please enter a valid 5-digit ZIP code.";
    return;
  }

  try {
    const response = await fetch(`https://api.zippopotam.us/us/${zip}`);
    if (!response.ok) {
      message.innerText = "ZIP not found.";
      return;
    }

    const data = await response.json();
    const state = data.places[0]["state abbreviation"];

    // Rough USDA zone estimate by state (simple version for now)
    const zoneMap = {
      "CA": 9, "FL": 9, "TX": 8, "GA": 8,
      "PA": 6, "NY": 6, "IL": 5, "OH": 6,
      "WI": 4, "MN": 4, "MI": 5,
      "NC": 7, "SC": 8, "VA": 7,
      "AZ": 9, "NV": 8, "CO": 5
    };

    userZone = zoneMap[state] || 6; // default fallback

    message.innerText = `Detected Zone ${userZone} (based on state ${state}).`;

    document.getElementById("preferences").style.display = "block";

    loadCSV();

  } catch (error) {
    message.innerText = "Error detecting ZIP.";
  }
}

// STEP 2: Load plant CSV
function loadCSV() {
  Papa.parse("rootplans_master_database.csv", {
    download: true,
    header: true,
    complete: function(results) {
      plantsData = results.data;
    }
  });
}

// STEP 3: Filter plants
function generatePlan() {
  const pollinatorOnly = document.getElementById("pollinator").checked;

  filteredPlants = plantsData.filter(p => {
    if (!p["USDA Zone"]) return false;

    const zones = p["USDA Zone"].split(",").map(z => z.trim());

    if (!zones.includes(String(userZone))) return false;

    if (pollinatorOnly && p["Pollinator Friendly"] !== "Yes") return false;

    return true;
  });

  displayPlants();
}

// STEP 4: Display table
function displayPlants() {
  const table = document.getElementById("plantsTable");
  const tbody = table.querySelector("tbody");
  tbody.innerHTML = "";

  filteredPlants.forEach(p => {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${p["Plant Name"] || ""}</td>
      <td>${p["Category"] || ""}</td>
      <td>${p["USDA Zone"] || ""}</td>
      <td>${p["Pollinator Friendly"] || ""}</td>
    `;
    tbody.appendChild(row);
  });

  table.style.display = "table";
  document.getElementById("downloadBtn").style.display = "inline-block";
}

// STEP 5: Download CSV
function downloadCSV() {
  const csv = Papa.unparse(filteredPlants);
  const blob = new Blob([csv], { type: "text/csv" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "garden_plan.csv";
  link.click();
}
</script>

</body>
</html>
